<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Préstamos de Libros</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h2 {
      text-align: center;
      color: #2d3748;
      font-size: 1.5rem;
      margin-bottom: 24px;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
    }

    button {
      padding: 10px 24px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #357abd;
    }

    button:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }

    .table-wrapper {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #4a90e2;
      color: white;
    }

    th {
      padding: 14px 18px;
      text-align: left;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      padding: 13px 18px;
      color: #2d3748;
      font-size: 0.93rem;
      border-bottom: 1px solid #e2e8f0;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: #f7fafc;
    }

    .badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: capitalize;
    }

    .badge-activa {
      background: #c6f6d5;
      color: #276749;
    }

    .badge-vencida {
      background: #fed7d7;
      color: #9b2c2c;
    }

    .badge-devuelta {
      background: #bee3f8;
      color: #2a69ac;
    }

    .status-msg {
      text-align: center;
      padding: 40px;
      color: #718096;
      font-size: 0.95rem;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid #ffffff55;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>📚 Préstamos de Libros</h2>

    <div class="toolbar">
      <button id="btnRecargar" onclick="cargar()">🔄 Recargar</button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Alumno</th>
            <th>Libro</th>
            <th>Fecha</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="tbody">

        </tbody>
      </table>
    </div>
  </div>

</body>

<script src="script.js"></script>

</html>
